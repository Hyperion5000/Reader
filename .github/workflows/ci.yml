name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check
        run: python -m py_compile src/reader/markdown_converter.py

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Repository hygiene
        shell: pwsh
        run: |
          $forbidden = @(
            "Reader_Portable.exe",
            "runtime",
            "markdown_result_",
            ".pdf",
            ".docx",
            ".doc"
          )
          $tracked = git ls-files
          foreach ($item in $tracked) {
            foreach ($pattern in $forbidden) {
              if ($item -like "*$pattern*") {
                throw "Forbidden tracked file detected: $item"
              }
            }
          }
